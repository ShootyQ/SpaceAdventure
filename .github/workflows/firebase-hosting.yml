name: Deploy to Firebase Hosting

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}
  NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
  FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: spaceadventure-7d540

jobs:
  deploy-live:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase service account secret JSON (live)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPACEADVENTURE_7D540 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" | python -c "import json,sys; s=sys.stdin.read(); d=json.loads(s); assert isinstance(d,dict); assert d.get('type')=='service_account'; assert d.get('client_email'); assert d.get('private_key'); print('Firebase service account JSON is valid')"

      - name: Validate required deploy secrets (live)
        run: |
          [ -n "${{ secrets.STRIPE_SECRET_KEY }}" ] || (echo "Missing STRIPE_SECRET_KEY" && exit 1)
          [ -n "${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}" ] || (echo "Missing NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY" && exit 1)
          [ -n "${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}" ] || (echo "Missing NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY" && exit 1)
          [ -n "${{ secrets.FIREBASE_CLIENT_EMAIL }}" ] || (echo "Missing FIREBASE_CLIENT_EMAIL" && exit 1)
          [ -n "${{ secrets.FIREBASE_PRIVATE_KEY }}" ] || (echo "Missing FIREBASE_PRIVATE_KEY" && exit 1)

      - name: Create .env.local for framework build (live)
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}
          NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=spaceadventure-7d540
          EOF

      - name: Create Firebase service account file (live)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPACEADVENTURE_7D540 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}
          NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: spaceadventure-7d540
        run: |
          npx firebase-tools@13.31.2 deploy \
            --project spaceadventure-7d540 \
            --only hosting

  deploy-dev-preview:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/dev') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase service account secret JSON (dev)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPACEADVENTURE_7D540 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" | python -c "import json,sys; s=sys.stdin.read(); d=json.loads(s); assert isinstance(d,dict); assert d.get('type')=='service_account'; assert d.get('client_email'); assert d.get('private_key'); print('Firebase service account JSON is valid')"

      - name: Validate required deploy secrets (dev)
        run: |
          [ -n "${{ secrets.STRIPE_SECRET_KEY }}" ] || (echo "Missing STRIPE_SECRET_KEY" && exit 1)
          [ -n "${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}" ] || (echo "Missing NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY" && exit 1)
          [ -n "${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}" ] || (echo "Missing NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY" && exit 1)
          [ -n "${{ secrets.FIREBASE_CLIENT_EMAIL }}" ] || (echo "Missing FIREBASE_CLIENT_EMAIL" && exit 1)
          [ -n "${{ secrets.FIREBASE_PRIVATE_KEY }}" ] || (echo "Missing FIREBASE_PRIVATE_KEY" && exit 1)

      - name: Create .env.local for framework build (dev)
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}
          NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=spaceadventure-7d540
          EOF

      - name: Create Firebase service account file (dev)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPACEADVENTURE_7D540 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: 'Deploy to Firebase Hosting (preview: dev)'
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY }}
          NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: spaceadventure-7d540
        run: |
          npx firebase-tools@13.31.2 hosting:channel:deploy dev \
            --project spaceadventure-7d540
